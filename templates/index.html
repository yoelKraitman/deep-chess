<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Chess Analyzer Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #302e2b; color: #babaca; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-layout { display: flex; gap: 20px; max-width: 1050px; width: 100%; }
        .board-section { flex: 1; max-width: 500px; }
        #myBoard { width: 100%; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-radius: 4px; }
        .sidebar { flex: 1; background: #262421; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; height: 750px; }
        .sidebar-header { background: #211f1c; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; color: #fff; border-bottom: 1px solid #3c3a38; }
        .section { padding: 15px; border-bottom: 1px solid #3c3a38; }
        .section h4 { margin: 0 0 10px 0; color: #fff; font-size: 14px; }
        select.opening-select { width: 100%; padding: 10px; background: #3c3a38; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-bottom: 10px; }
        textarea { width: 90%; height: 50px; background: #3c3a38; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 8px; font-family: monospace; direction: ltr; resize: none; margin-bottom: 10px; }
        .ai-box { flex-grow: 1; padding: 15px; background: #2a2826; color: #e0e0e0; overflow-y: auto; text-align: right; border-right: 4px solid #81b64c; }
        #ai-explanation { font-size: 14px; line-height: 1.6; }
        #ai-explanation p { margin-bottom: 12px; }
        .controls-row { display: flex; background: #211f1c; padding: 10px; justify-content: center; gap: 5px; }
        .nav-btn { background: #3c3a38; color: #fff; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .nav-btn:hover { background: #555; }
        .action-btn { background: #81b64c; font-weight: bold; width: 100%; margin-top: 10px; }
        .action-btn:hover { background: #a3d160; }
        #status { text-align: center; font-size: 18px; margin-bottom: 10px; color: #fff; font-weight: bold; }
        
        .highlight-orange { box-shadow: inset 0 0 0 50px rgba(255, 170, 0, 0.6) !important; }
        .highlight-green  { box-shadow: inset 0 0 0 50px rgba(150, 188, 75, 0.6) !important; }
        .highlight-blue   { box-shadow: inset 0 0 0 50px rgba(82, 176, 220, 0.6) !important; }
        .highlight-red    { box-shadow: inset 0 0 0 50px rgba(235, 97, 80, 0.6) !important; }
        .highlight-best   { box-shadow: inset 0 0 4px 4px rgba(129, 182, 76, 0.8) !important; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="board-section">
            <div id="status">תור הלבן לשחק</div>
            <div id="myBoard"></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">🔍 Analysis Studio</div>
            
            <div class="section">
                <h4>📚 סייר הפתיחות (Openings Explorer)</h4>
                <select id="opening-family" class="opening-select" onchange="updateVariations()">
                    <option value="">-- בחר משפחת פתיחות --</option>
                    <option value="sicilian">הגנה סיציליאנית (Sicilian)</option>
                    <option value="italian">פתיחה איטלקית (Italian)</option>
                    <option value="spanish">פתיחה ספרדית (Ruy Lopez)</option>
                    <option value="queens_gambit">גמביט המלכה (Queen's Gambit)</option>
                    <option value="french">הגנה צרפתית (French)</option>
                </select>
                <select id="opening-variation" class="opening-select" onchange="loadOpening()" style="display:none;">
                    <option value="">-- בחר וריאציה --</option>
                </select>
            </div>

            <div class="section">
                <h4>או הדבק PGN משלך:</h4>
                <textarea id="pgn-input" placeholder="הדבק PGN כאן..."></textarea>
                <button class="nav-btn action-btn" onclick="loadPGN()">טען משחק</button>
            </div>

            <div class="ai-box">
                <h4 style="color:#81b64c; margin-top:0;">ניתוח המנוע 🧠</h4>
                <div id="ai-explanation">
                    <p>בחר פתיחה מהתפריט למעלה כדי להתחיל.</p>
                    <p>לאחר הטעינה, לחץ על <b>החץ ימינה במקלדת</b> או בכפתור כדי לנתח כל מהלך בנפרד.</p>
                </div>
            </div>

            <div class="controls-row">
                <button class="nav-btn" onclick="goToStart()" title="התחלה">⏮️</button>
                <button class="nav-btn" onclick="prevMove()" title="אחורה (חץ שמאלה)">◀️</button>
                <button class="nav-btn" onclick="nextMove()" title="קדימה (חץ ימינה)">▶️</button>
                <button class="nav-btn" onclick="goToEnd()" title="סוף">⏭️</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null; 
        var game = new Chess();
        var $status = $('#status'); 
        var $aiText = $('#ai-explanation');
        var moveHistory = []; 
        var currentMoveIndex = -1;

        // --- מאגר הפתיחות המלא ---
        const openingsDB = {
            "sicilian": [
                { name: "סיציליאנית פתוחה (Open)", pgn: "1. e4 c5 2. Nf3 d6 3. d4" },
                { name: "וריאציית הדרקון (Dragon)", pgn: "1. e4 c5 2. Nf3 d6 3. d4 cxd4 4. Nxd4 Nf6 5. Nc3 g6 6. Be3 Bg7 7. f3 O-O 8. Qd2 Nc6 9. Bc4 Bd7 10. O-O-O" },
                { name: "וריאציית ניידורף (Najdorf)", pgn: "1. e4 c5 2. Nf3 d6 3. d4 cxd4 4. Nxd4 Nf6 5. Nc3 a6 6. Be3 e5 7. Nb3 Be6 8. f3 Be7 9. Qd2 O-O 10. O-O-O" },
                { name: "וריאציית אלפין (Alapin)", pgn: "1. e4 c5 2. c3" }
            ],
            "italian": [
                { name: "ג'ואוקו פיאנו (Giuoco Piano)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bc4 Bc5 4. c3 Nf6 5. d3 d6 6. O-O O-O" },
                { name: "הגנת שני הפרשים (Two Knights)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bc4 Nf6 4. Ng5 d5 5. exd5 Na5" }
            ],
            "spanish": [
                { name: "ספרדית קו ראשי (Main Line)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4 Nf6 5. O-O Be7 6. Re1 b5 7. Bb3 d6 8. c3 O-O 9. h3" },
                { name: "הגנת ברלין (Berlin)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bb5 Nf6 4. O-O Nxe4 5. d4 Nd6 6. Bxc6 dxc6 7. dxe5 Nf5 8. Qxd8+ Kxd8" }
            ],
            "queens_gambit": [
                { name: "גמביט המלכה התקבל (Accepted)", pgn: "1. d4 d5 2. c4 dxc4" },
                { name: "גמביט נדחה קו ראשי", pgn: "1. d4 d5 2. c4 e6 3. Nc3 Nf6 4. Bg5 Be7 5. e3 O-O 6. Nf3 h6 7. Bh4" },
                { name: "הגנה סלאבית (Slav Defense)", pgn: "1. d4 d5 2. c4 c6 3. Nf3 Nf6 4. Nc3 dxc4" }
            ],
            "french": [
                { name: "וריאציית ההתקדמות (Advance)", pgn: "1. e4 e6 2. d4 d5 3. e5 c5 4. c3 Nc6 5. Nf3 Qb6 6. a3 c4" },
                { name: "ההחלפה (Exchange)", pgn: "1. e4 e6 2. d4 d5 3. exd5 exd5 4. Nf3 Bd6" }
            ]
        };

        // --- אתחול הלוח ---
        var config = {
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd
        };
        board = Chessboard('myBoard', config);

        // --- מערכת ציור החצים וה-SVG ---
        const COLORS = { orange: "rgba(255, 170, 0, 0.85)", green:  "rgba(150, 188, 75, 0.85)", blue:   "rgba(82, 176, 220, 0.85)", red:    "rgba(235, 97, 80, 0.85)" };
        $('#myBoard').append(`<svg id="svg-arrows" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100;"><defs id="arrow-markers"></defs><g id="ai-arrow-group"></g><g id="custom-arrow-group"></g></svg>`);

        function updateSVGMarkers() {
            var defs = $('#arrow-markers'); defs.empty();
            const allColors = { ai: "rgba(129, 182, 76, 0.9)", ...COLORS };
            for (const [key, val] of Object.entries(allColors)) {
                var marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', 'arrowhead-' + key); marker.setAttribute('markerWidth', '3'); marker.setAttribute('markerHeight', '3');
                marker.setAttribute('refX', '2.2'); marker.setAttribute('refY', '1.5'); marker.setAttribute('orient', 'auto');
                var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon'); poly.setAttribute('points', '0 0, 3 1.5, 0 3'); poly.setAttribute('fill', val);
                marker.appendChild(poly); defs[0].appendChild(marker);
            }
        }
        updateSVGMarkers();

        function getActiveColor(e) { if (e.shiftKey) return 'green'; if (e.altKey) return 'blue'; if (e.ctrlKey || e.metaKey) return 'red'; return 'orange'; }
        function getSqCoords(sq) { var sqSize = $('#myBoard').width() / 8; var file = "abcdefgh".indexOf(sq[0]); var rank = 8 - parseInt(sq[1]); return { x: file * sqSize + sqSize / 2, y: rank * sqSize + sqSize / 2, size: sqSize }; }

        function drawArrow(fromSq, toSq, type, colorKey = 'orange') {
            var start = getSqCoords(fromSq); var end = getSqCoords(toSq);
            var color = (type === 'ai') ? "rgba(129, 182, 76, 0.9)" : COLORS[colorKey];
            var marker = (type === 'ai') ? "url(#arrowhead-ai)" : `url(#arrowhead-${colorKey})`;
            var arrowId = type + '-' + fromSq + '-' + toSq;

            if (document.getElementById(arrowId)) { document.getElementById(arrowId).remove(); return; }

            var group = (type === 'ai') ? document.getElementById('ai-arrow-group') : document.getElementById('custom-arrow-group');

            // לוגיקת צורת L לסוס
            var fileDiff = Math.abs("abcdefgh".indexOf(toSq[0]) - "abcdefgh".indexOf(fromSq[0]));
            var rankDiff = Math.abs(parseInt(toSq[1]) - parseInt(fromSq[1]));
            var isL_Shape = (fileDiff === 1 && rankDiff === 2) || (fileDiff === 2 && rankDiff === 1);

            if (isL_Shape && type !== 'ai') {
                var rawFileDiff = "abcdefgh".indexOf(toSq[0]) - "abcdefgh".indexOf(fromSq[0]); var rawRankDiff = parseInt(toSq[1]) - parseInt(fromSq[1]);
                var elbowSq = (Math.abs(rawFileDiff) > Math.abs(rawRankDiff)) ? toSq[0] + fromSq[1] : fromSq[0] + toSq[1];
                var elbow = getSqCoords(elbowSq);
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path'); path.setAttribute('id', arrowId);
                path.setAttribute('d', `M ${start.x} ${start.y} L ${elbow.x} ${elbow.y} L ${end.x} ${end.y}`);
                path.setAttribute('stroke', color); path.setAttribute('stroke-width', start.size / 6); path.setAttribute('fill', 'none'); path.setAttribute('marker-end', marker); path.setAttribute('stroke-linejoin', 'round'); path.setAttribute('stroke-linecap', 'round');
                group.appendChild(path);
            } else {
                var dx = end.x - start.x; var dy = end.y - start.y; var angle = Math.atan2(dy, dx);
                var endX = end.x - (start.size * 0.45) * Math.cos(angle); var endY = end.y - (start.size * 0.45) * Math.sin(angle);
                var line = document.createElementNS('http://www.w3.org/2000/svg', 'line'); line.setAttribute('id', arrowId);
                line.setAttribute('x1', start.x); line.setAttribute('y1', start.y); line.setAttribute('x2', endX); line.setAttribute('y2', endY);
                line.setAttribute('stroke', color); line.setAttribute('stroke-width', start.size / 6); line.setAttribute('marker-end', marker); line.setAttribute('stroke-linecap', 'round');
                group.appendChild(line);
            }
        }

        function highlightBestMove(bestMoveUci) {
            if (!bestMoveUci || bestMoveUci === "N/A" || bestMoveUci.length < 4) return;
            var fromSquare = bestMoveUci.substring(0, 2); var toSquare = bestMoveUci.substring(2, 4);
            $('.square-' + fromSquare).addClass('highlight-best'); $('.square-' + toSquare).addClass('highlight-best');
            drawArrow(fromSquare, toSquare, 'ai');
        }

        // --- מאזינים לעכבר (ימני ושמאלי) ---
        var boardEl = document.getElementById('myBoard'); 
        var rightClickStartSq = null;
        
        function getSquareFromMouse(e) {
            var rect = boardEl.getBoundingClientRect(); var x = e.clientX - rect.left; var y = e.clientY - rect.top;
            if (x < 0 || x >= rect.width || y < 0 || y >= rect.height) return null;
            var sqSize = rect.width / 8; var fileIdx = Math.floor(x / sqSize); var rankIdx = 7 - Math.floor(y / sqSize);
            return "abcdefgh"[fileIdx] + (rankIdx + 1);
        }

        boardEl.addEventListener('contextmenu', function (e) { e.preventDefault(); }, true);
        
        boardEl.addEventListener('mousedown', function (e) {
            if (e.button === 2) { 
                e.stopPropagation(); e.preventDefault(); rightClickStartSq = getSquareFromMouse(e); 
            } else if (e.button === 0) { 
                // מנקה רק את החצים האישיים בקליק שמאלי
                $('#custom-arrow-group').empty(); 
                $('#myBoard .square-55d63').removeClass('highlight-orange highlight-green highlight-blue highlight-red');
            }
        }, true);
        
        boardEl.addEventListener('mouseup', function (e) {
            if (e.button === 2) {
                e.stopPropagation(); e.preventDefault();
                if (rightClickStartSq) {
                    var endSq = getSquareFromMouse(e); var color = getActiveColor(e);
                    if (endSq) {
                        if (rightClickStartSq === endSq) $('.square-' + endSq).toggleClass('highlight-' + color);
                        else drawArrow(rightClickStartSq, endSq, 'custom', color);
                    }
                }
                rightClickStartSq = null;
            }
        }, true);

        // --- פונקציות הניקוי החשובות ---
        function clearAIHighlights() {
            $('#ai-arrow-group').empty();
            $('.square-55d63').removeClass('highlight-best');
        }

        function clearCustomHighlights() {
            $('#custom-arrow-group').empty();
            $('.square-55d63').removeClass('highlight-orange highlight-green highlight-blue highlight-red');
        }

        // --- תקשורת מול השרת (ה-AI) ---
        function analyzeFromServer(fen_before, move_uci) {
            $aiText.html('<i>המאמן מנתח את הפעולה... 🧠⏳</i>');
            clearAIHighlights(); // מנקה את החץ הקודם
            
            var currentHistory = game.history().join(' '); // שולח היסטוריה כדי שה-AI ידע את הפתיחה
            
            fetch('/analyze', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fen: fen_before, move: move_uci, history: currentHistory })
            })
            .then(response => response.json())
            .then(data => {
                clearAIHighlights(); // מנקה שוב למקרה שלחצנו מהר מדי
                if (data.error) {
                    $aiText.html('<span style="color:#ff6b6b;">שגיאה: ' + data.error + '</span>');
                } else { 
                    $aiText.html(data.explanation); 
                    if (data.best_move) highlightBestMove(data.best_move); 
                }
            }).catch(e => $aiText.html('<span style="color:#ff6b6b;">שגיאה בתקשורת עם השרת.</span>'));
        }

        // --- ניהול הפתיחות וניווט ---
        function updateVariations() {
            var family = $('#opening-family').val(); 
            var varSelect = $('#opening-variation');
            varSelect.empty().append('<option value="">-- בחר וריאציה (מלאה) --</option>');
            if (family && openingsDB[family]) {
                openingsDB[family].forEach(v => varSelect.append(`<option value="${v.pgn}">${v.name}</option>`));
                varSelect.slideDown(200);
            } else { varSelect.slideUp(200); }
        }

        function loadOpening() {
            var pgn = $('#opening-variation').val(); 
            if (pgn) { 
                $('#pgn-input').val(pgn); 
                loadPGN(); 
            } 
        }

        function loadPGN() {
            var pgn = $('#pgn-input').val(); 
            game.reset(); 
            clearAIHighlights(); 
            clearCustomHighlights();
            
            if (game.load_pgn(pgn)) {
                // שומרים את כל המהלכים של הפתיחה למערך
                moveHistory = game.history({ verbose: true }); 
                // חוזרים להתחלה כדי שהמשתמש יוכל להריץ אותם אחד אחד!
                game.reset(); 
                currentMoveIndex = -1; 
                board.position(game.fen()); 
                updateStatus();
                $aiText.html('<b style="color:#81b64c;">✅ וריאציה נטענה בהצלחה!</b><br><br>הפתיחה הוכנסה לזיכרון. לחץ על <b>החץ ימינה</b> במקלדת כדי לרוץ על המהלכים וללמוד אותם צעד אחר צעד.');
            } else { 
                alert("קוד ה-PGN שהזנת אינו תקין."); 
            }
        }

        function nextMove() {
            if (currentMoveIndex < moveHistory.length - 1) {
                var fen_before = game.fen(); 
                currentMoveIndex++; 
                var move = moveHistory[currentMoveIndex];
                game.move(move.san); 
                board.position(game.fen()); 
                updateStatus();
                clearAIHighlights(); 
                clearCustomHighlights();
                analyzeFromServer(fen_before, move.from + move.to + (move.promotion ? move.promotion : ''));
            }
        }

        function prevMove() {
            if (currentMoveIndex >= 0) {
                game.undo(); 
                currentMoveIndex--; 
                board.position(game.fen()); 
                updateStatus();
                clearAIHighlights(); 
                clearCustomHighlights();
                $aiText.html('<i>חזרנו מהלך אחורה. מוכן לניתוח.</i>');
            }
        }

        function goToStart() {
            while (currentMoveIndex >= 0) { game.undo(); currentMoveIndex--; }
            board.position(game.fen()); 
            updateStatus();
            clearAIHighlights(); 
            clearCustomHighlights();
            $aiText.html('<i>התחלת המשחק.</i>');
        }

        function goToEnd() {
            while (currentMoveIndex < moveHistory.length - 1) { 
                currentMoveIndex++; 
                var move = moveHistory[currentMoveIndex]; 
                game.move(move.san); 
            }
            board.position(game.fen()); 
            updateStatus();
            clearAIHighlights(); 
            clearCustomHighlights();
            $aiText.html('<i>סוף המשחק.</i>');
        }

        // האזנה למקלדת
        document.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevMove(); }
            if (e.key === 'ArrowRight') { e.preventDefault(); nextMove(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); goToStart(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); goToEnd(); }
        });

        function onDragStart(source, piece) { if (game.game_over() || (game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false; }
        function onDrop(source, target) {
            var fen_before = game.fen(); 
            var move_obj = game.move({ from: source, to: target, promotion: 'q' });
            if (move_obj === null) return 'snapback';
            
            // אם המשתמש משחק חופשי על הלוח
            moveHistory = game.history({ verbose: true }); 
            currentMoveIndex = moveHistory.length - 1; 
            updateStatus();
            clearAIHighlights(); 
            clearCustomHighlights();
            analyzeFromServer(fen_before, source + target + (move_obj.promotion ? move_obj.promotion : ''));
        }
        function onSnapEnd() { board.position(game.fen()); }
        
        function updateStatus() {
            var statusHTML = ''; var moveColor = (game.turn() === 'w') ? 'לבן' : 'שחור';
            if (game.in_checkmate()) statusHTML = 'שח-מט! ' + moveColor + ' הפסיד.';
            else if (game.in_draw()) statusHTML = 'תיקו';
            else { statusHTML = 'תור ה' + moveColor; if (game.in_check()) statusHTML += ', שח!'; }
            $status.html(statusHTML);
        }
        
        updateStatus();
    </script>
</body>
</html>
