<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Chess Analyzer Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #302e2b;
            color: #babaca;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* ===== LAYOUT ===== */
        .main-layout {
            display: flex;
            gap: 12px;
            max-width: 1180px;
            width: 100%;
            align-items: flex-start;
        }
        .board-section { flex-shrink: 0; width: 480px; }
        .sidebar {
            flex: 1;
            background: #262421;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 740px;
            max-height: 820px;
        }

        /* ===== EVAL BAR ===== */
        .eval-bar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 22px;
            flex-shrink: 0;
        }
        .eval-bar {
            width: 22px;
            height: 480px;
            border-radius: 4px;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
            border: 1px solid #444;
        }
        .eval-black-fill {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: #1a1a1a;
            transition: height 0.5s ease;
        }
        .eval-white-fill {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: #f0d9b5;
            transition: height 0.5s ease;
        }
        .eval-score {
            font-size: 11px;
            color: #ccc;
            font-weight: bold;
            writing-mode: horizontal-tb;
            text-align: center;
        }

        /* ===== BOARD ===== */
        #myBoard { width: 100%; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.6); border-radius: 4px; }
        #status {
            text-align: center;
            font-size: 16px;
            margin-bottom: 8px;
            color: #fff;
            font-weight: bold;
            background: #211f1c;
            padding: 8px;
            border-radius: 6px;
        }
        .board-controls {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 8px;
        }
        .nav-btn {
            background: #3c3a38;
            color: #fff;
            border: none;
            padding: 9px 13px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: #555; }
        .flip-btn { background: #4a4845; font-size: 13px; padding: 9px 12px; }

        /* ===== SIDEBAR COMPONENTS ===== */
        .sidebar-header {
            background: #1d1b18;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            border-bottom: 1px solid #3c3a38;
            letter-spacing: 0.5px;
        }
        .section {
            padding: 10px 14px;
            border-bottom: 1px solid #3c3a38;
        }
        .section h4 { margin: 0 0 8px 0; color: #ccc; font-size: 13px; }
        select.opening-select {
            width: 100%;
            padding: 8px;
            background: #3c3a38;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            height: 44px;
            background: #3c3a38;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 7px;
            font-family: monospace;
            direction: ltr;
            resize: none;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .action-btn {
            background: #81b64c;
            font-weight: bold;
            width: 100%;
            color: #fff;
            border: none;
            padding: 7px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .action-btn:hover { background: #a3d160; }

        /* ===== MOVE QUALITY BADGE ===== */
        .quality-banner {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #3c3a38;
            background: #211f1c;
        }
        .quality-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
        }
        .quality-badge.brilliant { background: #1bade4; }
        .quality-badge.good      { background: #81b64c; }
        .quality-badge.inaccuracy { background: #cda543; color: #111; }
        .quality-badge.mistake   { background: #e58b1a; }
        .quality-badge.blunder   { background: #e84855; }
        .quality-badge.hidden    { display: none; }

        .score-change {
            font-size: 12px;
            color: #999;
            direction: ltr;
        }

        /* ===== AI ANALYSIS BOX ===== */
        .ai-box {
            flex-grow: 1;
            padding: 14px;
            background: #2a2826;
            color: #e0e0e0;
            overflow-y: auto;
            text-align: right;
            border-right: 4px solid #81b64c;
        }
        #ai-explanation { font-size: 13.5px; line-height: 1.65; }
        #ai-explanation p { margin-bottom: 14px; }
        #ai-explanation b { color: #e8c96b; }

        /* ===== MOVE LIST ===== */
        .move-list-section {
            border-top: 1px solid #3c3a38;
            padding: 8px 10px;
            background: #1d1b18;
            max-height: 80px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
        }
        .move-pair { display: inline-flex; align-items: center; gap: 2px; margin-left: 6px; }
        .move-num { color: #666; font-size: 11px; margin-left: 4px; }
        .move-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            background: #3c3a38;
            color: #ddd;
            transition: background 0.15s;
        }
        .move-chip:hover { background: #555; }
        .move-chip.active { background: #555; color: #fff; font-weight: bold; }
        .move-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-brilliant  { background: #1bade4; }
        .dot-good       { background: #81b64c; }
        .dot-inaccuracy { background: #cda543; }
        .dot-mistake    { background: #e58b1a; }
        .dot-blunder    { background: #e84855; }
        .dot-none       { background: transparent; }

        /* ===== SQUARE HIGHLIGHTS ===== */
        .highlight-orange { box-shadow: inset 0 0 0 50px rgba(255,170,0,0.6) !important; }
        .highlight-green  { box-shadow: inset 0 0 0 50px rgba(150,188,75,0.6) !important; }
        .highlight-blue   { box-shadow: inset 0 0 0 50px rgba(82,176,220,0.6) !important; }
        .highlight-red    { box-shadow: inset 0 0 0 50px rgba(235,97,80,0.6) !important; }
        .highlight-best   { box-shadow: inset 0 0 4px 4px rgba(129,182,76,0.8) !important; }

        /* ===== LOADING SPINNER ===== */
        .loading-dots { display: inline-flex; gap: 5px; }
        .loading-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: #81b64c;
            animation: pulse 1.2s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
<div class="main-layout">

    <!-- EVAL BAR -->
    <div class="eval-bar-container">
        <div class="eval-bar">
            <div class="eval-black-fill" id="eval-black-fill" style="height:50%"></div>
            <div class="eval-white-fill" id="eval-white-fill" style="height:50%"></div>
        </div>
        <div class="eval-score" id="eval-score-display">0.0</div>
    </div>

    <!-- BOARD SECTION -->
    <div class="board-section">
        <div id="status">תור הלבן לשחק</div>
        <div id="myBoard"></div>
        <div class="board-controls">
            <button class="nav-btn flip-btn" onclick="flipBoard()" title="הפוך לוח">↕ הפוך</button>
            <button class="nav-btn" onclick="goToStart()" title="התחלה">⏮</button>
            <button class="nav-btn" onclick="prevMove()" title="אחורה">◀</button>
            <button class="nav-btn" onclick="nextMove()" title="קדימה">▶</button>
            <button class="nav-btn" onclick="goToEnd()" title="סוף">⏭</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">🔍 Analysis Studio</div>

        <!-- OPENINGS -->
        <div class="section">
            <h4>📚 סייר הפתיחות</h4>
            <select id="opening-family" class="opening-select" onchange="updateVariations()">
                <option value="">-- בחר משפחת פתיחות --</option>
                <option value="sicilian">הגנה סיציליאנית (Sicilian)</option>
                <option value="italian">פתיחה איטלקית (Italian)</option>
                <option value="spanish">פתיחה ספרדית (Ruy Lopez)</option>
                <option value="queens_gambit">גמביט המלכה (Queen's Gambit)</option>
                <option value="french">הגנה צרפתית (French)</option>
                <option value="kings_indian">הגנה הינדית (King's Indian)</option>
                <option value="caro_kann">הגנת קארו-קאן (Caro-Kann)</option>
                <option value="english">פתיחה אנגלית (English)</option>
                <option value="kings_gambit">גמביט המלך (King's Gambit)</option>
                <option value="london">מערכת לונדון (London)</option>
            </select>
            <select id="opening-variation" class="opening-select" onchange="loadOpening()" style="display:none;">
                <option value="">-- בחר וריאציה --</option>
            </select>
        </div>

        <!-- PGN -->
        <div class="section">
            <h4>📋 הדבק PGN משחק</h4>
            <textarea id="pgn-input" placeholder="הדבק PGN כאן..."></textarea>
            <button class="action-btn" onclick="loadPGN()">טען משחק</button>
        </div>

        <!-- QUALITY BANNER -->
        <div class="quality-banner" id="quality-banner" style="display:none;">
            <span class="quality-badge hidden" id="quality-badge"></span>
            <span class="score-change" id="score-change-display"></span>
        </div>

        <!-- AI ANALYSIS -->
        <div class="ai-box">
            <div id="ai-explanation">
                <p style="color:#81b64c; font-weight:bold;">ברוך הבא ל-Analysis Studio 🧠</p>
                <p>בחר פתיחה מהתפריט, הדבק PGN, או פשוט גרור כלים על הלוח.</p>
                <p>לאחר כל מהלך תקבל ניתוח מעמיק עם:</p>
                <p>🎯 הלוגיקה האסטרטגית<br>💡 כלל ברזל לזיכרון<br>⚔️ תוכנית הענישה המדויקת</p>
            </div>
        </div>

        <!-- MOVE LIST -->
        <div class="move-list-section" id="move-list"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
    // ===== STATE =====
    var board = null;
    var game = new Chess();
    var moveHistory = [];
    var currentMoveIndex = -1;
    var moveQualities = [];   // { type, label, san } per move
    var boardFlipped = false;

    // ===== OPENINGS DB =====
    const openingsDB = {
        "sicilian": [
            { name: "סיציליאנית פתוחה (Open)", pgn: "1. e4 c5 2. Nf3 d6 3. d4" },
            { name: "וריאציית ניידורף (Najdorf)", pgn: "1. e4 c5 2. Nf3 d6 3. d4 cxd4 4. Nxd4 Nf6 5. Nc3 a6 6. Be3 e5 7. Nb3 Be6 8. f3 Be7 9. Qd2 O-O 10. O-O-O" },

            { name: "וריאציית אלפין (Alapin)", pgn: "1. e4 c5 2. c3 Nf6 3. e5 Nd5 4. d4 cxd4 5. cxd4 d6" }

        ],

            { name: "ספרדית קו ראשי (Main Line)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4 Nf6 5. O-O Be7 6. Re1 b5 7. Bb3 d6 8. c3 O-O 9. h3" },
            { name: "הגנת ברלין (Berlin)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bb5 Nf6 4. O-O Nxe4 5. d4 Nd6 6. Bxc6 dxc6 7. dxe5 Nf5 8. Qxd8+ Kxd8" },
            { name: "הגנת מארשל (Marshall Attack)", pgn: "1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4 Nf6 5. O-O Be7 6. Re1 b5 7. Bb3 O-O 8. c3 d5 9. exd5 Nxd5 10. Nxe5 Nxe5 11. Rxe5 c6" }
        ],
        "queens_gambit": [
            { name: "גמביט המלכה התקבל (Accepted)", pgn: "1. d4 d5 2. c4 dxc4 3. Nf3 Nf6 4. e3 e6 5. Bxc4 c5" },
            { name: "גמביט נדחה - קו ראשי (QGD Main)", pgn: "1. d4 d5 2. c4 e6 3. Nc3 Nf6 4. Bg5 Be7 5. e3 O-O 6. Nf3 h6 7. Bh4" },
            { name: "הגנה סלאבית (Slav Defense)", pgn: "1. d4 d5 2. c4 c6 3. Nf3 Nf6 4. Nc3 dxc4 5. a4 Bf5 6. e3 e6" },
            { name: "הגנת קמברידג' ספרינגס (Cambridge Springs)", pgn: "1. d4 d5 2. c4 e6 3. Nc3 Nf6 4. Bg5 Nbd7 5. e3 c6 6. Nf3 Qa5" }
        ],
        "french": [
            { name: "וריאציית ההתקדמות (Advance)", pgn: "1. e4 e6 2. d4 d5 3. e5 c5 4. c3 Nc6 5. Nf3 Qb6 6. a3 c4" },
            { name: "וריאציית ויניאוואר (Winawer)", pgn: "1. e4 e6 2. d4 d5 3. Nc3 Bb4 4. e5 c5 5. a3 Bxc3+ 6. bxc3 Ne7" },
            { name: "ההחלפה (Exchange)", pgn: "1. e4 e6 2. d4 d5 3. exd5 exd5 4. Nf3 Bd6 5. Bd3 Ne7 6. O-O O-O" },
            { name: "וריאציית קלאסי (Classical)", pgn: "1. e4 e6 2. d4 d5 3. Nc3 Nf6 4. Bg5 Be7 5. e5 Nfd7 6. Bxe7 Qxe7" }
        ],
        "kings_indian": [
            { name: "הינדית - קו ראשי (Main Line)", pgn: "1. d4 Nf6 2. c4 g6 3. Nc3 Bg7 4. e4 d6 5. Nf3 O-O 6. Be2 e5 7. O-O Nc6 8. d5 Ne7" },
            { name: "התקפת ארבעת הפרשים (Four Pawns Attack)", pgn: "1. d4 Nf6 2. c4 g6 3. Nc3 Bg7 4. e4 d6 5. f4 O-O 6. Nf3 c5 7. d5 e6 8. Be2 exd5" },
            { name: "וריאציית סמאש (Samisch)", pgn: "1. d4 Nf6 2. c4 g6 3. Nc3 Bg7 4. e4 d6 5. f3 O-O 6. Be3 e5 7. d5 Nh5" }
        ],
        "caro_kann": [
            { name: "קארו-קאן קלאסי (Classical)", pgn: "1. e4 c6 2. d4 d5 3. Nc3 dxe4 4. Nxe4 Bf5 5. Ng3 Bg6 6. h4 h6 7. Nf3 Nd7 8. h5 Bh7 9. Bd3 Bxd3 10. Qxd3 e6" },
            { name: "וריאציית ההתקדמות (Advance)", pgn: "1. e4 c6 2. d4 d5 3. e5 Bf5 4. Nf3 e6 5. Be2 Nd7 6. O-O Ne7 7. Nbd2 h6" },
            { name: "פאנוב (Panov Attack)", pgn: "1. e4 c6 2. d4 d5 3. exd5 cxd5 4. c4 Nf6 5. Nc3 e6 6. Nf3 Be7 7. cxd5 Nxd5" }
        ],
        "english": [
            { name: "אנגלית סימטרית (Symmetrical)", pgn: "1. c4 c5 2. Nf3 Nf6 3. Nc3 Nc6 4. g3 g6 5. Bg2 Bg7 6. O-O O-O" },
            { name: "אנגלית נגד הינדית (vs King's Indian)", pgn: "1. c4 Nf6 2. Nc3 g6 3. e4 d6 4. d4 Bg7 5. Nf3 O-O 6. Be2" },
            { name: "אנגלית - e4 (Reversed Sicilian)", pgn: "1. c4 e5 2. Nc3 Nf6 3. g3 d5 4. cxd5 Nxd5 5. Bg2 Nb6 6. Nf3 Nc6" }
        ],
        "kings_gambit": [
            { name: "גמביט המלך התקבל (King's Gambit Accepted)", pgn: "1. e4 e5 2. f4 exf4 3. Nf3 d6 4. Bc4 h6 5. d4 g5" },
            { name: "הגנת פוקס (Falkbeer Counter Gambit)", pgn: "1. e4 e5 2. f4 d5 3. exd5 e4 4. d3 Nf6 5. dxe4 Nxe4 6. Nf3 Bc5" }
        ],
        "london": [
            { name: "מערכת לונדון (London System)", pgn: "1. d4 d5 2. Nf3 Nf6 3. Bf4 e6 4. e3 Bd6 5. Bg3 O-O 6. Nbd2 c5 7. c3" },
            { name: "לונדון נגד הינדית", pgn: "1. d4 Nf6 2. Nf3 g6 3. Bf4 Bg7 4. e3 O-O 5. h3 d6 6. Be2 c5" }
        ]
    };

    // ===== BOARD INIT =====
    var config = {
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    board = Chessboard('myBoard', config);

    // ===== EVAL BAR =====
    function scoreToPercent(cp) {
        return 50 + 50 * (2 / Math.PI) * Math.atan(cp / 400);
    }
    function updateEvalBar(scoreWhiteCp) {
        var pct = scoreToPercent(scoreWhiteCp);
        document.getElementById('eval-white-fill').style.height = pct + '%';
        document.getElementById('eval-black-fill').style.height = (100 - pct) + '%';
        var displayCp = scoreWhiteCp / 100.0;
        var txt = Math.abs(scoreWhiteCp) >= 9000 ? 'מט' : (displayCp >= 0 ? '+' : '') + displayCp.toFixed(1);
        document.getElementById('eval-score-display').textContent = txt;
    }
    function resetEvalBar() {
        document.getElementById('eval-white-fill').style.height = '50%';
        document.getElementById('eval-black-fill').style.height = '50%';
        document.getElementById('eval-score-display').textContent = '0.0';
    }

    // ===== QUALITY BADGE =====
    const QUALITY_COLORS = { brilliant: '#1bade4', good: '#81b64c', inaccuracy: '#cda543', mistake: '#e58b1a', blunder: '#e84855' };
    function showQualityBadge(mistakeType, mistakeLabel, cpLoss, scoreBefore, scoreAfter) {
        var banner = document.getElementById('quality-banner');
        var badge = document.getElementById('quality-badge');
        banner.style.display = 'flex';
        badge.className = 'quality-badge ' + mistakeType;
        badge.textContent = mistakeLabel;
        var changeText = '';
        if (cpLoss !== undefined) {
            var sign = cpLoss > 0 ? '-' : '+';
            changeText = sign + Math.abs(cpLoss / 100.0).toFixed(1) + ' יחידות';
        }
        document.getElementById('score-change-display').textContent = changeText;
    }
    function hideQualityBadge() {
        document.getElementById('quality-banner').style.display = 'none';
    }

    // ===== SVG ARROWS =====
    var $board = $('#myBoard');
    $board.append('<svg id="svg-arrows" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;"><defs id="arrow-markers"></defs><g id="ai-arrow-group"></g><g id="custom-arrow-group"></g></svg>');

    const COLORS = {
        orange: "rgba(255,170,0,0.85)",
        green: "rgba(150,188,75,0.85)",
        blue: "rgba(82,176,220,0.85)",
        red: "rgba(235,97,80,0.85)"
    };

    function updateSVGMarkers() {
        var defs = $('#arrow-markers'); defs.empty();
        var allColors = { ai: "rgba(129,182,76,0.9)", ...COLORS };
        for (var [key, val] of Object.entries(allColors)) {
            var marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead-' + key);
            marker.setAttribute('markerWidth', '3'); marker.setAttribute('markerHeight', '3');
            marker.setAttribute('refX', '2.2'); marker.setAttribute('refY', '1.5');
            marker.setAttribute('orient', 'auto');
            var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', '0 0, 3 1.5, 0 3'); poly.setAttribute('fill', val);
            marker.appendChild(poly); defs[0].appendChild(marker);
        }
    }
    updateSVGMarkers();

    function getActiveColor(e) {
        if (e.shiftKey) return 'green';
        if (e.altKey) return 'blue';
        if (e.ctrlKey || e.metaKey) return 'red';
        return 'orange';
    }

    function getSqCoords(sq) {
        var sqSize = $board.width() / 8;
        var file = "abcdefgh".indexOf(sq[0]);
        var rank = 8 - parseInt(sq[1]);
        if (boardFlipped) { file = 7 - file; rank = 7 - rank; }
        return { x: file * sqSize + sqSize / 2, y: rank * sqSize + sqSize / 2, size: sqSize };
    }

    function drawArrow(fromSq, toSq, type, colorKey) {
        colorKey = colorKey || 'orange';
        var start = getSqCoords(fromSq); var end = getSqCoords(toSq);
        var color = (type === 'ai') ? "rgba(129,182,76,0.9)" : COLORS[colorKey];
        var marker = (type === 'ai') ? "url(#arrowhead-ai)" : "url(#arrowhead-" + colorKey + ")";
        var arrowId = type + '-' + fromSq + '-' + toSq;
        if (document.getElementById(arrowId)) { document.getElementById(arrowId).remove(); return; }
        var group = (type === 'ai') ? document.getElementById('ai-arrow-group') : document.getElementById('custom-arrow-group');
        var fileDiff = Math.abs("abcdefgh".indexOf(toSq[0]) - "abcdefgh".indexOf(fromSq[0]));
        var rankDiff = Math.abs(parseInt(toSq[1]) - parseInt(fromSq[1]));
        var isKnight = (fileDiff === 1 && rankDiff === 2) || (fileDiff === 2 && rankDiff === 1);
        if (isKnight && type !== 'ai') {
            var rawFileDiff = "abcdefgh".indexOf(toSq[0]) - "abcdefgh".indexOf(fromSq[0]);
            var rawRankDiff = parseInt(toSq[1]) - parseInt(fromSq[1]);
            var elbowSq = (Math.abs(rawFileDiff) > Math.abs(rawRankDiff)) ? toSq[0] + fromSq[1] : fromSq[0] + toSq[1];
            var elbow = getSqCoords(elbowSq);
            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('id', arrowId);
            path.setAttribute('d', 'M ' + start.x + ' ' + start.y + ' L ' + elbow.x + ' ' + elbow.y + ' L ' + end.x + ' ' + end.y);
            path.setAttribute('stroke', color); path.setAttribute('stroke-width', start.size / 6);
            path.setAttribute('fill', 'none'); path.setAttribute('marker-end', marker);
            path.setAttribute('stroke-linejoin', 'round'); path.setAttribute('stroke-linecap', 'round');
            group.appendChild(path);
        } else {
            var dx = end.x - start.x; var dy = end.y - start.y;
            var angle = Math.atan2(dy, dx);
            var endX = end.x - (start.size * 0.45) * Math.cos(angle);
            var endY = end.y - (start.size * 0.45) * Math.sin(angle);
            var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('id', arrowId);
            line.setAttribute('x1', start.x); line.setAttribute('y1', start.y);
            line.setAttribute('x2', endX); line.setAttribute('y2', endY);
            line.setAttribute('stroke', color); line.setAttribute('stroke-width', start.size / 6);
            line.setAttribute('marker-end', marker); line.setAttribute('stroke-linecap', 'round');
            group.appendChild(line);
        }
    }

    function highlightBestMove(bestMoveUci) {
        if (!bestMoveUci || bestMoveUci === "N/A" || bestMoveUci.length < 4) return;
        var from = bestMoveUci.substring(0, 2); var to = bestMoveUci.substring(2, 4);
        $('.square-' + from).addClass('highlight-best'); $('.square-' + to).addClass('highlight-best');
        drawArrow(from, to, 'ai');
    }

    // ===== MOUSE HANDLERS =====
    var boardEl = document.getElementById('myBoard'); var rightClickStartSq = null;
    function getSquareFromMouse(e) {
        var rect = boardEl.getBoundingClientRect(); var x = e.clientX - rect.left; var y = e.clientY - rect.top;
        if (x < 0 || x >= rect.width || y < 0 || y >= rect.height) return null;
        var sqSize = rect.width / 8; var fileIdx = Math.floor(x / sqSize); var rankIdx = 7 - Math.floor(y / sqSize);
        if (boardFlipped) { fileIdx = 7 - fileIdx; rankIdx = 7 - rankIdx; }
        return "abcdefgh"[fileIdx] + (rankIdx + 1);
    }
    boardEl.addEventListener('contextmenu', function(e) { e.preventDefault(); }, true);
    boardEl.addEventListener('mousedown', function(e) {
        if (e.button === 2) { e.stopPropagation(); e.preventDefault(); rightClickStartSq = getSquareFromMouse(e); }
        else if (e.button === 0) { $('#custom-arrow-group').empty(); $('#myBoard .square-55d63').removeClass('highlight-orange highlight-green highlight-blue highlight-red'); }
    }, true);
    boardEl.addEventListener('mouseup', function(e) {
        if (e.button === 2) {
            e.stopPropagation(); e.preventDefault();
            if (rightClickStartSq) {
                var endSq = getSquareFromMouse(e); var color = getActiveColor(e);
                if (endSq) {
                    if (rightClickStartSq === endSq) $('.square-' + endSq).toggleClass('highlight-' + color);
                    else drawArrow(rightClickStartSq, endSq, 'custom', color);
                }
            }
            rightClickStartSq = null;
        }
    }, true);

    // ===== CLEAR HELPERS =====
    function clearAIHighlights() {
        $('#ai-arrow-group').empty(); $('.square-55d63').removeClass('highlight-best');
    }
    function clearCustomHighlights() {
        $('#custom-arrow-group').empty(); $('.square-55d63').removeClass('highlight-orange highlight-green highlight-blue highlight-red');
    }

    // ===== MOVE LIST =====
    function renderMoveList() {
        var $list = $('#move-list'); $list.empty();
        for (var i = 0; i < moveHistory.length; i += 2) {
            var moveNum = Math.floor(i / 2) + 1;
            var $pair = $('<div class="move-pair"></div>');
            $pair.append('<span class="move-num">' + moveNum + '.</span>');
            var w = moveHistory[i];
            var wq = moveQualities[i] || { type: 'none', san: w.san };
            var wActive = (currentMoveIndex === i) ? ' active' : '';
            var wDot = '<span class="move-dot dot-' + wq.type + '"></span>';
            var $wChip = $('<span class="move-chip' + wActive + '" data-idx="' + i + '">' + wDot + w.san + '</span>');
            $wChip.on('click', (function(idx) { return function() { jumpToMove(idx); }; })(i));
            $pair.append($wChip);
            if (i + 1 < moveHistory.length) {
                var b = moveHistory[i + 1];
                var bq = moveQualities[i + 1] || { type: 'none', san: b.san };
                var bActive = (currentMoveIndex === i + 1) ? ' active' : '';
                var bDot = '<span class="move-dot dot-' + bq.type + '"></span>';
                var $bChip = $('<span class="move-chip' + bActive + '" data-idx="' + (i+1) + '">' + bDot + b.san + '</span>');
                $bChip.on('click', (function(idx) { return function() { jumpToMove(idx); }; })(i + 1));
                $pair.append($bChip);
            }
            $list.append($pair);
        }
        // scroll active chip into view
        var $active = $list.find('.move-chip.active');
        if ($active.length) {
            $list.scrollLeft($active.position().left + $list.scrollLeft() - $list.width() / 2);
        }
    }

    function jumpToMove(targetIdx) {
        // Reset to start then play forward to targetIdx
        game.reset();
        while (currentMoveIndex >= 0) currentMoveIndex--;
        currentMoveIndex = -1;
        for (var i = 0; i <= targetIdx; i++) {
            game.move(moveHistory[i].san);
            currentMoveIndex = i;
        }
        board.position(game.fen());
        updateStatus();
        clearAIHighlights();
        clearCustomHighlights();
        hideQualityBadge();
        renderMoveList();
        $('#ai-explanation').html('<i>לחץ ▶ כדי לנתח את המהלך הנוכחי.</i>');
    }

    // ===== SERVER COMMUNICATION =====
    function analyzeFromServer(fen_before, move_uci, move_idx) {
        var $aiText = $('#ai-explanation');
        $aiText.html('<div style="text-align:center;padding:20px;"><div class="loading-dots"><span></span><span></span><span></span></div><br><small>המאמן מנתח... 🧠</small></div>');
        clearAIHighlights();
        hideQualityBadge();

        var currentHistory = game.history().join(' ');
        var moveNumber = move_idx + 1;

        fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fen: fen_before,
                move: move_uci,
                history: currentHistory,
                move_number: moveNumber
            })
        })
        .then(r => r.json())
        .then(data => {
            clearAIHighlights();
            if (data.error) {
                $aiText.html('<span style="color:#ff6b6b;">שגיאה: ' + data.error + '</span>');
                return;
            }
            $aiText.html(data.explanation);
            if (data.best_move) highlightBestMove(data.best_move);
            if (data.mistake_type) {
                showQualityBadge(data.mistake_type, data.mistake_label, data.cp_loss);
                // store quality for the move list
                moveQualities[move_idx] = { type: data.mistake_type, label: data.mistake_label };
                renderMoveList();
            }
            if (data.score_white_cp !== undefined) {
                updateEvalBar(data.score_white_cp);
            }
        })
        .catch(e => $aiText.html('<span style="color:#ff6b6b;">שגיאה בתקשורת עם השרת.</span>'));
    }

    // ===== OPENINGS =====
    function updateVariations() {
        var family = $('#opening-family').val();
        var $varSelect = $('#opening-variation');
        $varSelect.empty().append('<option value="">-- בחר וריאציה --</option>');
        if (family && openingsDB[family]) {
            openingsDB[family].forEach(v => $varSelect.append('<option value="' + v.pgn + '">' + v.name + '</option>'));
            $varSelect.slideDown(200);
        } else { $varSelect.slideUp(200); }
    }
    function loadOpening() {
        var pgn = $('#opening-variation').val();
        if (pgn) { $('#pgn-input').val(pgn); loadPGN(); }
    }
    function loadPGN() {
        var pgn = $('#pgn-input').val();
        game.reset(); clearAIHighlights(); clearCustomHighlights();
        hideQualityBadge(); resetEvalBar();
        if (game.load_pgn(pgn)) {
            moveHistory = game.history({ verbose: true });
            moveQualities = new Array(moveHistory.length).fill(null);
            game.reset(); currentMoveIndex = -1;
            board.position(game.fen()); updateStatus(); renderMoveList();
            $('#ai-explanation').html('<b style="color:#81b64c;">✅ נטען בהצלחה!</b><br><br>לחץ על <b>▶</b> לניתוח צעד אחר צעד.');
        } else {
            alert("קוד ה-PGN שהזנת אינו תקין.");
        }
    }

    // ===== NAVIGATION =====
    function nextMove() {
        if (currentMoveIndex < moveHistory.length - 1) {
            var fen_before = game.fen();
            currentMoveIndex++;
            var move = moveHistory[currentMoveIndex];
            game.move(move.san);
            board.position(game.fen()); updateStatus();
            clearAIHighlights(); clearCustomHighlights();
            analyzeFromServer(fen_before, move.from + move.to + (move.promotion || ''), currentMoveIndex);
        }
    }
    function prevMove() {
        if (currentMoveIndex >= 0) {
            game.undo(); currentMoveIndex--;
            board.position(game.fen()); updateStatus();
            clearAIHighlights(); clearCustomHighlights();
            hideQualityBadge(); resetEvalBar();
            renderMoveList();
            $('#ai-explanation').html('<i>חזרנו מהלך אחורה.</i>');
        }
    }
    function goToStart() {
        while (currentMoveIndex >= 0) { game.undo(); currentMoveIndex--; }
        board.position(game.fen()); updateStatus();
        clearAIHighlights(); clearCustomHighlights();
        hideQualityBadge(); resetEvalBar();
        renderMoveList();
        $('#ai-explanation').html('<i>התחלת המשחק.</i>');
    }
    function goToEnd() {
        while (currentMoveIndex < moveHistory.length - 1) {
            currentMoveIndex++;
            game.move(moveHistory[currentMoveIndex].san);
        }
        board.position(game.fen()); updateStatus();
        clearAIHighlights(); clearCustomHighlights();
        renderMoveList();
        $('#ai-explanation').html('<i>סוף המשחק. לחץ ◀ כדי לנתח מהלכים.</i>');
    }
    function flipBoard() {
        boardFlipped = !boardFlipped;
        board.flip();
        clearAIHighlights();
    }

    // ===== DRAG & DROP =====
    function onDragStart(source, piece) {
        if (game.game_over()) return false;
        if (game.turn() === 'w' && piece.search(/^b/) !== -1) return false;
        if (game.turn() === 'b' && piece.search(/^w/) !== -1) return false;
    }
    function onDrop(source, target) {
        var fen_before = game.fen();
        var move_obj = game.move({ from: source, to: target, promotion: 'q' });
        if (move_obj === null) return 'snapback';
        moveHistory = game.history({ verbose: true });
        moveQualities = new Array(moveHistory.length).fill(null);
        currentMoveIndex = moveHistory.length - 1;
        updateStatus(); clearAIHighlights(); clearCustomHighlights();
        renderMoveList();
        analyzeFromServer(fen_before, source + target + (move_obj.promotion || ''), currentMoveIndex);
    }
    function onSnapEnd() { board.position(game.fen()); }

    // ===== STATUS =====
    function updateStatus() {
        var moveColor = (game.turn() === 'w') ? 'לבן' : 'שחור';
        var txt;
        if (game.in_checkmate()) txt = 'שח-מט! ' + moveColor + ' הפסיד.';
        else if (game.in_draw()) txt = 'תיקו';
        else { txt = 'תור ה' + moveColor; if (game.in_check()) txt += ' — שח!'; }
        $('#status').html(txt);
    }

    // ===== KEYBOARD =====
    document.addEventListener('keydown', function(e) {
        if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft') { e.preventDefault(); prevMove(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); nextMove(); }
        if (e.key === 'ArrowUp') { e.preventDefault(); goToStart(); }
        if (e.key === 'ArrowDown') { e.preventDefault(); goToEnd(); }
    });

    updateStatus();
    renderMoveList();
</script>
</body>
</html>
